<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Our Calendar</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
            box-sizing: border-box;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-apple {
            background-color: #000000;
        }
        .btn-google {
            background-color: #4285F4;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Subscribe to the Calendar</h1>
        <p>Choose your device below to sync our event schedule directly to your phone. You'll get automatic updates when new events are added.</p>

        <a href="webcal://calendar.google.com/calendar/ical/574e32915602c1fb0df454ed20cfd0c52d30bb1c80090ad66cf4ecf3de7bfbe1%40group.calendar.google.com/public/basic.ics" class="btn btn-apple">
            Sync to Apple / iPhone
        </a>

<!-- Button for Android / Google Calendar users -->
        <a href="https://calendar.google.com/calendar/embed?src=574e32915602c1fb0df454ed20cfd0c52d30bb1c80090ad66cf4ecf3de7bfbe1%40group.calendar.google.com" class="btn btn-google">
            Sync to Google / Android
        </a>
        </a>
        </a>
    </div>

</body>
</html>
