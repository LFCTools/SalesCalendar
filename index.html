<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Our Calendars</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; }
        h1 { color: #333; font-size: 22px; margin-bottom: 20px; }
        .calendar-section { background: #fafafa; border: 1px solid #eef; border-radius: 8px; padding: 12px; margin-bottom: 15px; text-align: left; }
        .calendar-title { font-size: 15px; font-weight: bold; color: #222; margin: 0 0 10px 0; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; display: block; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; color: white; text-align: center; }
        .btn-apple { background-color: #000000; }
        .btn-google { background-color: #4285F4; }
    </style>
</head>

    <div class="card">

        <!-- Premier League Home -->
        <div class="calendar-section">
